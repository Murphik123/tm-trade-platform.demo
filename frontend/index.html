    // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ДЛЯ РАБОТЫ С API ----------
    function apiRequest(method, url, body = null, auth = true) {
        var headers = { 'Content-Type': 'application/json' };
        if (auth) {
            var token = localStorage.getItem('tm_token');
            if (token) headers['Authorization'] = 'Bearer ' + token;
        }
        var options = { method, headers };
        if (body) options.body = JSON.stringify(body);
        return fetch(API_BASE_URL + url, options)
            .then(res => res.json())
            .catch(err => {
                console.error('API Error:', err);
                ui.notify('Ошибка', 'Не удалось связаться с сервером', 'error');
                return null;
            });
    }

    // ---------- UI (рендеринг) с вызовами API ----------
    var ui = {
        getLang: function() {
            try { var l = localStorage.getItem('app_lang'); if (l && LANGS.indexOf(l) !== -1) return l; } catch(e) {}
            return 'ru';
        },
        t: function(key) {
            var l = this.getLang();
            var dict = LANG[l] || LANG['ru'];
            return dict[key] || key;
        },
        notify: function(title, msg, type) {
            type = type || 'success';
            var modal = document.getElementById('notifModal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'notifModal';
                modal.className = 'notification-modal';
                modal.innerHTML = '<div class="notif-modal-content"><div id="notifIcon" class="text-6xl mb-4">✅</div><h2 id="notifTitle" class="text-2xl font-bold mb-2">Успех</h2><p id="notifMessage" class="text-gray-600 mb-6">Сообщение</p><button onclick="document.getElementById(\'notifModal\').style.display=\'none\'" class="bg-emerald-700 text-white px-6 py-2 rounded-full font-semibold hover:bg-emerald-800 transition">OK</button></div>';
                document.body.appendChild(modal);
            }
            document.getElementById('notifTitle').textContent = title;
            document.getElementById('notifMessage').innerHTML = msg;
            var icon = document.getElementById('notifIcon');
            icon.textContent = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
            modal.style.display = 'flex';
            modal.onclick = function(e) { if (e.target === modal) modal.style.display = 'none'; };
        },
        clock: function() {
            var el = document.getElementById('footerClock');
            if (el) el.textContent = new Date().toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
        },

        // Полноэкранный режим
        openFull: function(idx, slides) {
            if (!slides || !slides.length) return;
            window._fsSlides = slides;
            window._fsIdx = idx;
            var modal = document.getElementById('fsModal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'fsModal';
                modal.className = 'fullscreen-modal';
                modal.innerHTML = '<button class="modal-close" onclick="ui.closeFull()">&times;</button><div class="fullscreen-content"><img id="fsImg" src=""></div><button class="fullscreen-nav prev" id="fsPrev"><i class="fas fa-chevron-left"></i></button><button class="fullscreen-nav next" id="fsNext"><i class="fas fa-chevron-right"></i></button>';
                document.body.appendChild(modal);
                modal.onclick = function(e) { if (e.target === modal) ui.closeFull(); };
                document.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape' && modal.style.display === 'flex') ui.closeFull();
                    if (e.key === 'ArrowLeft' && modal.style.display === 'flex') ui.showFull(window._fsIdx - 1);
                    if (e.key === 'ArrowRight' && modal.style.display === 'flex') ui.showFull(window._fsIdx + 1);
                });
                document.getElementById('fsPrev').onclick = function(e) { e.stopPropagation(); ui.showFull(window._fsIdx - 1); };
                document.getElementById('fsNext').onclick = function(e) { e.stopPropagation(); ui.showFull(window._fsIdx + 1); };
            }
            ui.showFull(idx);
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        },
        closeFull: function() {
            var m = document.getElementById('fsModal');
            if (m) m.style.display = 'none';
            document.body.style.overflow = '';
        },
        showFull: function(idx) {
            var slides = window._fsSlides;
            if (!slides || !slides.length) return;
            if (idx < 0) idx = slides.length - 1;
            if (idx >= slides.length) idx = 0;
            window._fsIdx = idx;
            var img = document.getElementById('fsImg');
            if (img) img.src = slides[idx].img;
        },

        // Карусель (без изменений, работает с localStorage)
        renderCarousel: function() {
            var container = document.getElementById('carouselContainer');
            if (!container) return;
            var slides = JSON.parse(localStorage.getItem('tm_carousel_slides') || '[]');
            var current = 0, interval;

            function show(idx) {
                if (!slides.length || !slides[idx] || !slides[idx].img) {
                    container.innerHTML = '<div class="relative w-full h-full flex flex-col items-center justify-center bg-amber-800 text-white text-2xl p-6 text-center"><i class="fas fa-images text-6xl mb-4 opacity-50"></i><span>' + ui.t('uploadPlaceholder') + '</span><button onclick="document.getElementById(\'fileInput\').click()" class="mt-4 bg-white/20 hover:bg-white/30 px-6 py-2 rounded-full text-sm transition"><i class="fas fa-upload"></i> ' + ui.t('uploadOwn') + '</button></div>';
                    return;
                }
                var s = slides[idx];
                container.innerHTML = '<div class="relative w-full h-full" ondblclick="ui.openFull(' + idx + ', slidesData)"><img src="' + s.img + '" class="carousel-image w-full h-full object-cover" onerror="this.parentElement.innerHTML=\'<div class=\'w-full h-full flex items-center justify-center bg-amber-800 text-white text-2xl\'>' + (s.title || '') + '</div>\'"></div>';
            }

            function start() {
                if (interval) clearInterval(interval);
                if (slides.length > 1 && slides[0] && slides[0].img) {
                    interval = setInterval(function() {
                        current = (current + 1) % slides.length;
                        show(current);
                    }, 6000);
                }
            }
            window.slidesData = slides;
            show(current);
            start();

            var prev = document.getElementById('carouselPrev');
            var next = document.getElementById('carouselNext');
            if (prev && next) {
                prev.onclick = function() { if (slides.length) { current = (current - 1 + slides.length) % slides.length; show(current); start(); } };
                next.onclick = function() { if (slides.length) { current = (current + 1) % slides.length; show(current); start(); } };
            }

            var parent = container.parentElement;
            var ctrl = document.getElementById('sliderCtrl');
            if (!ctrl && parent) {
                ctrl = document.createElement('button');
                ctrl.id = 'sliderCtrl';
                ctrl.className = 'slider-control';
                ctrl.innerHTML = '<i class="fas fa-sliders-h"></i>';
                parent.appendChild(ctrl);
                var drop = document.createElement('div');
                drop.id = 'sliderDrop';
                drop.className = 'slider-dropdown';
                var up = document.createElement('button');
                up.innerHTML = '<i class="fas fa-upload"></i> ' + ui.t('uploadOwn');
                up.onclick = function(e) { e.stopPropagation(); drop.style.display = 'none'; document.getElementById('fileInput').click(); };
                var reset = document.createElement('button');
                reset.innerHTML = '<i class="fas fa-trash"></i> ' + ui.t('resetSlider');
                reset.onclick = function(e) { e.stopPropagation(); drop.style.display = 'none'; localStorage.removeItem('tm_carousel_slides'); ui.renderCarousel(); ui.notify('Готово', 'Слайдер сброшен', 'success'); };
                drop.appendChild(up); drop.appendChild(reset);
                parent.appendChild(drop);
                ctrl.onclick = function(e) { e.stopPropagation(); drop.style.display = (drop.style.display === 'flex') ? 'none' : 'flex'; };
                document.addEventListener('click', function(e) {
                    if (!ctrl.contains(e.target) && !drop.contains(e.target)) drop.style.display = 'none';
                });
            }
        },

        handleFileUpload: function(ev) {
            var files = ev.target.files;
            if (files.length < 3) { ui.notify('Ошибка', 'Выберите 3 изображения', 'error'); return; }
            var newSlides = [], loaded = 0;
            for (var i=0; i<3; i++) {
                var file = files[i];
                if (!file.type.startsWith('image/')) continue;
                var reader = new FileReader();
                reader.onload = function(e) {
                    newSlides.push({ title: '', desc: '', img: e.target.result });
                    loaded++;
                    if (loaded === 3) {
                        localStorage.setItem('tm_carousel_slides', JSON.stringify(newSlides));
                        ui.renderCarousel();
                        ui.notify('Успех', 'Слайдер обновлён!', 'success');
                    }
                };
                reader.readAsDataURL(file);
            }
        },

                    '    <div class="text-xs text-gray-500 mb-2">' + this.t('fixedKeyInfo') + '</div>' +
                    '    <button type="submit" class="auth-btn">' + this.t('registerBtn') + '</button>' +

                    tab.onclick = function() {
                        modal.querySelectorAll('.auth-tab').forEach(function(t) { t.classList.remove('active'); });
                        tab.classList.add('active');
                        var isLogin = (tab.dataset.tab === 'login');
                        document.getElementById('loginForm').style.display = isLogin ? 'block' : 'none';
                        document.getElementById('registerForm').style.display = isLogin ? 'none' : 'block';
                    };
                });

                // Логин
                document.getElementById('loginForm').onsubmit = function(e) {
                    e.preventDefault();
                    var login = document.getElementById('loginEmail').value;
                    var pass = document.getElementById('loginPass').value;
                    apiRequest('POST', '/api/auth/login', { login, password: pass }, false)
                        .then(data => {
                            if (data.token) {
                                localStorage.setItem('tm_token', data.token);
                                localStorage.setItem('tm_user', JSON.stringify(data.user));
                                ui.renderMain();
                                modal.style.display = 'none';
                            } else {
                                ui.notify('Ошибка', data.message || ui.t('invalidLogin'), 'error');
                            }
                        });
                };

                // Регистрация
                document.getElementById('registerForm').onsubmit = function(e) {
                    e.preventDefault();
                    var name = document.getElementById('regName').value;
                    var email = document.getElementById('regEmail').value;
                    var phone = document.getElementById('regPhone').value;
                    var key = document.getElementById('regKey').value;
                    var role = document.getElementById('regRole').value;
                    var avatar = document.getElementById('regAvatar').value;
                    if (!name || !email || !phone || !key) {
                        ui.notify('Ошибка', ui.t('fillFields'), 'error');
                        return;
                    }
                    if (key !== FIXED_KEY) {
                        ui.notify('Ошибка', ui.t('keyMismatch'), 'error');
                        return;
                    }
                    apiRequest('POST', '/api/auth/register', { name, email, phone, electronicKey: key, role, avatar, password: DEF_PASS }, false)
                        .then(data => {
                            if (data.token) {
                                ui.notify('Успех', ui.t('regSuccess'), 'success');
                                modal.querySelector('.auth-tab[data-tab="login"]').click();
                            } else {
                                ui.notify('Ошибка', data.message || 'Ошибка регистрации', 'error');
                            }
                        });
                };

                document.getElementById('resetBtn').onclick = function() {
                    if (confirm(ui.t('reset') + '?')) {
                        localStorage.removeItem('tm_token');
                        localStorage.removeItem('tm_user');
                        localStorage.removeItem('tm_carousel_slides');
                        location.reload();
                    }
                };
            }
            modal.querySelectorAll('.auth-tab')[0].textContent = this.t('login');
            modal.querySelectorAll('.auth-tab')[1].textContent = this.t('register');
            document.getElementById('loginForm').querySelector('button').textContent = this.t('loginBtn');
            document.getElementById('registerForm').querySelector('button').textContent = this.t('registerBtn');
            document.getElementById('resetBtn').textContent = this.t('reset');
            modal.style.display = 'flex';
        },

        // ----- ТОРГОВЛЯ (с API) -----

                Promise.all([
                    apiRequest('GET', '/api/products?category=' + cat, null, true),
                    apiRequest('GET', '/api/cart', null, true)
                ]).then(([prodData, cartData]) => {
                    if (prodData) products = prodData;
                    if (cartData) cart = cartData;
                    cartLoaded = true;
                    render();
                });

                var filtered = products.filter(function(p) { return p.category === cat; });

                        '<div class="flex gap-2">' +

                        '  <button onclick="document.getElementById(\'prodModal\').style.display=\'none\'" class="bg-gray-300 hover:bg-gray-400 px-4 py-2 rounded transition">' + ui.t('cancel') + '</button>' +
                        '</div></div>';
                    document.body.appendChild(modal);
                    document.getElementById('submitProd').onclick = function() {
                        var name = document.getElementById('pName').value;
                        var retail = parseFloat(document.getElementById('pRetail').value);
                        var wholesale = parseFloat(document.getElementById('pWholesale').value) || retail * 0.85;
                        var image = document.getElementById('pImage').value;
                        var cat = document.getElementById('pCat').value;
                        if (!name || !retail || !image) {
                            ui.notify('Ошибка', 'Заполните все поля', 'error');
                            return;
                        }
                        apiRequest('POST', '/api/products', { name, retailPrice: retail, wholesalePrice: wholesale, image, category: cat }, true)
                            .then(data => {
                                if (data && data._id) {
                                    ui.notify('Успех', ui.t('productAdded'), 'success');
                                    modal.style.display = 'none';
                                    loadData();
                                } else {
                                    ui.notify('Ошибка', 'Не удалось добавить товар', 'error');
                                }
                            });
                    };
                }
                modal.style.display = 'flex';
            };
            loadData();
        },

        // ----- ЧАТ (с API) -----
        renderChat: function() {
            var user = JSON.parse(localStorage.getItem('tm_user') || 'null');
            if (!user) { this.renderPublic(); return; }
            var self = this;
            var msgs = [];

            function loadMessages() {
                apiRequest('GET', '/api/chat', null, true)
                    .then(data => {
                        if (data) msgs = data;
                        renderMsgs();
                    });
            }

            function renderMsgs() {
                var cont = document.getElementById('chatMsgs');
                if (!cont) return;
                var html = '';
                for (var i=0; i<msgs.length; i++) {
                    var m = msgs[i];
                    var align = (m.senderId && m.senderId._id === user._id) ? 'justify-end' : 'justify-start';
                    var bg = (m.senderId && m.senderId._id === user._id) ? 'bg-emerald-600 text-white' : 'bg-gray-100';
                    var senderName = m.senderId ? m.senderId.name : 'unknown';
                    var time = new Date(m.createdAt).toLocaleTimeString();
                    html += '<div class="flex ' + align + '"><div class="max-w-[70%] rounded-2xl px-4 py-2 ' + bg + '">' + m.text + '<div class="text-[10px] opacity-70 text-right">' + senderName + ' ' + time + '</div></div></div>';
                }
                cont.innerHTML = html;
                cont.scrollTop = cont.scrollHeight;
            }

            var app = document.getElementById('app');
            if (!app) return;
            app.innerHTML =
                '<div class="p-4 max-w-4xl mx-auto">' +
                '  <div class="flex justify-between"><h1 class="text-2xl font-bold">' + self.t('chat') + ' <span class="badge-eds"><i class="fas fa-lock"></i> E2EE</span></h1>' +
                '    <button onclick="app.navigateTo(\'home\')" class="bg-gray-200 px-4 py-2 rounded-xl">← ' + self.t('mainMenu') + '</button>' +
                '  </div>' +
                '  <div class="bg-white rounded-2xl shadow-xl flex flex-col h-[550px] mt-4 border border-white/60">' +
                '    <div id="chatMsgs" class="flex-1 overflow-auto p-4 space-y-2"></div>' +
                '    <div class="border-t p-3 flex gap-2">' +
                '      <input id="chatInput" class="flex-1 border rounded-full px-5 py-2 focus:outline-none focus:border-emerald-600" placeholder="Сообщение...">' +
                '      <button onclick="ui.sendChat()" class="bg-emerald-600 hover:bg-emerald-700 text-white rounded-full px-6 py-2 transition">' + self.t('loginBtn') + '</button>' +
                '    </div>' +
                '  </div>' +
                '</div>' +
                '<footer class="py-3 text-center text-xs text-gray-600 border-t border-white/30 flex justify-between items-center px-6"><span>© 2026 ' + self.t('appTitle') + ' — ' + self.t('subtitle') + '</span><span id="footerClock" class="footer-clock"></span></footer>';
            loadMessages();
            ui.clock();
            window.ui.sendChat = function() {
                var inp = document.getElementById('chatInput');
                if (!inp || !inp.value.trim()) return;
                var text = inp.value.trim();
                // Для демонстрации отправляем админу (id = 1)
                apiRequest('POST', '/api/chat', { receiverId: '1', text: text }, true)
                    .then(data => {
                        if (data) {
                            msgs.push(data);
                            renderMsgs();
                            inp.value = '';
                        }
                    });
            };
            if (window._clockInt) clearInterval(window._clockInt);
            window._clockInt = setInterval(ui.clock, 1000);
        },

        // ----- ПОЧТА (с API) -----
        renderMail: function() {
            var user = JSON.parse(localStorage.getItem('tm_user') || 'null');
            if (!user) { this.renderPublic(); return; }
            var self = this;
            var mails = [];

            function loadInbox() {
                apiRequest('GET', '/api/mail/inbox', null, true)
                    .then(data => {
                        if (data) mails = data;
                        renderList();
                    });
            }

            function renderList() {
                var list = document.getElementById('mailList');
                if (!list) return;
                var html = '';
                for (var i=0; i<mails.length; i++) {
                    var m = mails[i];
                    html += '<div onclick="ui.showMail(\'' + m._id + '\')" class="p-2 hover:bg-emerald-50 cursor-pointer border-b"><b>' + m.subject + '</b> <span class="text-xs text-gray-500">от ' + m.from + '</span></div>';
                }
                list.innerHTML = html;
            }

            window.ui.showMail = function(id) {
                var mail = mails.find(function(m) { return m._id === id; });
                var body = document.getElementById('mailBody');
                if (body && mail) {
                    body.innerHTML = '<h2 class="font-bold">' + mail.subject + '</h2><p class="text-sm">От: ' + mail.from + '</p><div class="mt-2 p-2 bg-gray-50 rounded">' + mail.body + '</div><div class="mt-2"><span class="badge-eds"><i class="fas fa-check"></i> Подписано ЭЦП</span></div>';
                    apiRequest('PUT', '/api/mail/read/' + id, null, true);
                }
            };

            var app = document.getElementById('app');
            if (!app) return;
            app.innerHTML =
                '<div class="p-4 max-w-6xl mx-auto">' +
                '  <div class="flex justify-between"><h1 class="text-2xl font-bold">' + self.t('mail') + ' <span class="badge-blockchain"><i class="fas fa-shield-alt"></i> Защищено</span></h1>' +
                '    <button onclick="app.navigateTo(\'home\')" class="bg-gray-200 px-4 py-2 rounded-xl">← ' + self.t('mainMenu') + '</button>' +
                '  </div>' +
                '  <div class="bg-white rounded-2xl shadow-xl mt-4 flex h-[500px] border border-white/60">' +
                '    <div id="mailList" class="w-1/3 border-r p-2 overflow-auto"></div>' +
                '    <div id="mailBody" class="w-2/3 p-4"></div>' +
                '  </div>' +
                '</div>' +
                '<footer class="py-3 text-center text-xs text-gray-600 border-t border-white/30 flex justify-between items-center px-6"><span>© 2026 ' + self.t('appTitle') + ' — ' + self.t('subtitle') + '</span><span id="footerClock" class="footer-clock"></span></footer>';
            loadInbox();
            ui.clock();
            if (window._clockInt) clearInterval(window._clockInt);
            window._clockInt = setInterval(ui.clock, 1000);
        },

        // ----- ПЛАТЕЖИ, КРИПТА, БАНК (заглушки) -----
        renderPay: function() {
            var self = this;
            var app = document.getElementById('app');
            if (!app) return;
            app.innerHTML =
                '<div class="p-5 max-w-2xl mx-auto">' +
                '  <h1 class="text-2xl font-bold">💳 ' + self.t('pay') + '</h1>' +
                '  <div class="bg-white p-6 rounded-2xl shadow-lg mt-4 border border-white/60">' +
                '    <p class="text-lg">' + self.t('balance') + ': <span class="font-bold text-emerald-700">18 750 TMT</span></p>' +
                '    <p class="text-sm text-gray-500"><i class="fas fa-check-circle text-green-500"></i> Интеграция с НСПП «Мир»</p>' +
                '    <button class="mt-4 bg-emerald-600 text-white px-6 py-2 rounded-full">Перевод</button>' +
                '  </div>' +
                '  <button onclick="app.navigateTo(\'home\')" class="mt-4 bg-gray-200 px-4 py-2 rounded-xl">← ' + self.t('mainMenu') + '</button>' +
                '</div>' +
                '<footer class="py-3 text-center text-xs text-gray-600 border-t border-white/30 flex justify-between items-center px-6"><span>© 2026 ' + self.t('appTitle') + ' — ' + self.t('subtitle') + '</span><span id="footerClock" class="footer-clock"></span></footer>';
            ui.clock();
            if (window._clockInt) clearInterval(window._clockInt);
            window._clockInt = setInterval(ui.clock, 1000);
        },

        renderCoin: function() {
            var self = this;
            var app = document.getElementById('app');
            if (!app) return;
            app.innerHTML =
                '<div class="p-5 max-w-2xl mx-auto">' +
                '  <h1 class="text-2xl font-bold">🪙 ' + self.t('coin') + '</h1>' +
                '  <div class="bg-white p-6 rounded-2xl shadow-lg mt-4 border border-white/60">' +
                '    <p class="text-lg">' + self.t('balance') + ': <span class="font-bold text-amber-600">540 TM Coin</span></p>' +
                '    <p class="text-sm text-gray-500"><i class="fas fa-microchip"></i> Майнинг-пул активен</p>' +
                '    <button class="mt-4 bg-amber-600 text-white px-6 py-2 rounded-full">Добыча</button>' +
                '  </div>' +
                '  <button onclick="app.navigateTo(\'home\')" class="mt-4 bg-gray-200 px-4 py-2 rounded-xl">← ' + self.t('mainMenu') + '</button>' +
                '</div>' +
                '<footer class="py-3 text-center text-xs text-gray-600 border-t border-white/30 flex justify-between items-center px-6"><span>© 2026 ' + self.t('appTitle') + ' — ' + self.t('subtitle') + '</span><span id="footerClock" class="footer-clock"></span></footer>';
            ui.clock();
            if (window._clockInt) clearInterval(window._clockInt);
            window._clockInt = setInterval(ui.clock, 1000);
        },

        renderBank: function() {
            var self = this;
            var app = document.getElementById('app');
            if (!app) return;
            app.innerHTML =
                '<div class="p-5 max-w-2xl mx-auto">' +
                '  <h1 class="text-2xl font-bold">🏦 ' + self.t('bank') + '</h1>' +
                '  <div class="bg-white p-6 rounded-2xl shadow-lg mt-4 border border-white/60">' +
                '    <p class="text-lg">' + self.t('credit') + ': <span class="font-bold text-teal-700">120 000 TMT</span></p>' +
                '    <button onclick="ui.notify(\'Гарантия\', \'Банковская гарантия выдана на сумму 50 000 TMT\', \'success\')" class="mt-2 bg-teal-600 text-white px-6 py-2 rounded-full transition hover:bg-teal-700">' + self.t('guarantee') + '</button>' +
                '  </div>' +
                '  <button onclick="app.navigateTo(\'home\')" class="mt-4 bg-gray-200 px-4 py-2 rounded-xl">← ' + self.t('mainMenu') + '</button>' +
                '</div>' +
                '<footer class="py-3 text-center text-xs text-gray-600 border-t border-white/30 flex justify-between items-center px-6"><span>© 2026 ' + self.t('appTitle') + ' — ' + self.t('subtitle') + '</span><span id="footerClock" class="footer-clock"></span></footer>';
            ui.clock();
            if (window._clockInt) clearInterval(window._clockInt);
            window._clockInt = setInterval(ui.clock, 1000);
        },

        // ----- АДМИНКА (с API) -----
        renderAdmin: function() {
            var user = JSON.parse(localStorage.getItem('tm_user') || 'null');
            if (!user || user.role !== 'admin') { app.navigateTo('home'); return; }
            var self = this;
            var app = document.getElementById('app');
            if (!app) return;

            function loadProducts() {
                apiRequest('GET', '/api/products', null, true)
                    .then(data => {
                        if (!data) data = [];
                        renderTable(data);
                    });
            }

            function renderTable(products) {
                var tableHtml = '<table class="product-table"><thead><tr><th>ID</th><th>Название</th><th>Розница</th><th>Опт</th><th>Категория</th><th>Картинка</th><th>Действие</th></tr></thead><tbody>';
                for (var i=0; i<products.length; i++) {
                    var p = products[i];
                    tableHtml += '<tr>' +
                        '<td>' + p._id.slice(-6) + '</td>' +
                        '<td>' + p.name + '</td>' +
                        '<td>' + p.retailPrice + ' TMT</td>' +
                        '<td>' + p.wholesalePrice + ' TMT</td>' +
                        '<td>' + p.category + '</td>' +
                        '<td><img src="' + p.image + '" style="max-height:40px;max-width:60px;object-fit:cover;" onerror="this.src=\'https://via.placeholder.com/60\'"></td>' +
                        '<td><i class="fas fa-edit edit-icon" onclick="ui.showEditProduct(\'' + p._id + '\')" title="Редактировать"></i> <i class="fas fa-trash text-red-500 cursor-pointer" onclick="ui.deleteProduct(\'' + p._id + '\')" title="Удалить"></i></td>' +
                        '</tr>';
                }
                tableHtml += '</tbody></table>';
                document.getElementById('adminTable').innerHTML = tableHtml;
            }

            app.innerHTML =
                '<div class="p-5 max-w-6xl mx-auto">' +
                '  <div class="flex justify-between items-center"><h1 class="text-2xl font-bold">👑 ' + self.t('admin') + ' <span class="badge-eds">ГОСУДАРСТВО</span></h1>' +
                '    <button onclick="app.navigateTo(\'home\')" class="bg-gray-200 px-4 py-2 rounded">← ' + self.t('mainMenu') + '</button>' +
                '  </div>' +
                '  <div class="mt-6">' +
                '    <h2 class="text-xl font-semibold mb-3">Управление товарами</h2>' +
                '    <div class="overflow-x-auto" id="adminTable"></div>' +
                '  </div>' +
                '  <div class="mt-8 bg-white p-6 rounded-2xl shadow-lg border border-white/60">' +
                '    <div class="grid md:grid-cols-3 gap-4">' +
                '      <button onclick="ui.notify(\'' + self.t('taxReport') + '\', \'Выгрузка XML: Налоговая база за июнь 2026. Сделок: 431. Сумма: 12.4 млн TMT. Запись в блокчейн: 0x8f3a...b1d2.\', \'success\')" class="bg-indigo-100 hover:bg-indigo-200 p-4 rounded-2xl shadow text-left transition"><i class="fas fa-file-invoice text-2xl text-indigo-700"></i><h3 class="font-bold">' + self.t('taxReport') + '</h3><p class="text-sm text-gray-500">XML / PDF</p></button>' +
                '      <button onclick="ui.notify(\'' + self.t('customsReport') + '\', \'Выгрузка: Таможенные декларации. Контрактов: 89. Грузов: 245 тонн. ЭЦП: подтверждена.\', \'success\')" class="bg-blue-100 hover:bg-blue-200 p-4 rounded-2xl shadow text-left transition"><i class="fas fa-ship text-2xl text-blue-700"></i><h3 class="font-bold">' + self.t('customsReport') + '</h3><p class="text-sm text-gray-500">XML / PDF</p></button>' +
                '      <button onclick="ui.notify(\'' + self.t('presidentReport') + '\', \'📊 Сводный доклад: Рост торговли на 12.3%. Собрано налогов: 2.1 млрд TMT. Активных участников: 3 442.\', \'success\')" class="bg-red-100 hover:bg-red-200 p-4 rounded-2xl shadow text-left transition"><i class="fas fa-landmark text-2xl text-red-700"></i><h3 class="font-bold">' + self.t('presidentReport') + '</h3><p class="text-sm text-gray-500">Аналитика</p></button>' +
                '    </div>' +
                '  </div>' +
                '</div>' +
                '<footer class="py-3 text-center text-xs text-gray-600 border-t border-white/30 flex justify-between items-center px-6"><span>© 2026 ' + self.t('appTitle') + ' — ' + self.t('subtitle') + '</span><span id="footerClock" class="footer-clock"></span></footer>';
            loadProducts();
            ui.clock();
            if (window._clockInt) clearInterval(window._clockInt);
            window._clockInt = setInterval(ui.clock, 1000);

            // Редактирование
            window.ui.showEditProduct = function(productId) {
                apiRequest('GET', '/api/products', null, true)
                    .then(products => {
                        var product = products.find(p => p._id === productId);
                        if (!product) { ui.notify('Ошибка', 'Товар не найден', 'error'); return; }
                        var modal = document.getElementById('editModal');
                        if (!modal) {
                            modal = document.createElement('div');
                            modal.id = 'editModal';
                            modal.className = 'product-modal';
                            modal.innerHTML =
                                '<div class="edit-modal-content bg-white p-6 rounded-2xl max-w-md w-full shadow-2xl">' +
                                '<h3 class="font-bold text-xl mb-3">' + ui.t('editProduct') + '</h3>' +
                                '<div class="edit-form">' +
                                '  <input id="editName" class="w-full border p-2 rounded mb-2" placeholder="' + ui.t('productName') + '">' +
                                '  <input id="editRetail" type="number" class="w-full border p-2 rounded mb-2" placeholder="' + ui.t('retailPrice') + '">' +
                                '  <input id="editWholesale" type="number" class="w-full border p-2 rounded mb-2" placeholder="' + ui.t('wholesalePrice') + '">' +
                                '  <input id="editImage" class="w-full border p-2 rounded mb-2" placeholder="' + ui.t('imageUrl') + '">' +
                                '  <select id="editCategory" class="w-full border p-2 rounded mb-3">' +
                                '    <option value="food">' + ui.t('food') + '</option>' +
                                '    <option value="light">' + ui.t('light') + '</option>' +
                                '    <option value="construction">' + ui.t('construction') + '</option>' +
                                '    <option value="home">' + ui.t('home') + '</option>' +
                                '  </select>' +
                                '  <div class="flex gap-2">' +
                                '    <button id="saveEditBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded transition">' + ui.t('saveChanges') + '</button>' +
                                '    <button onclick="document.getElementById(\'editModal\').style.display=\'none\'" class="bg-gray-300 hover:bg-gray-400 px-4 py-2 rounded transition">' + ui.t('cancel') + '</button>' +
                                '  </div>' +
                                '</div></div>';
                            document.body.appendChild(modal);
                            document.getElementById('saveEditBtn').onclick = function() {
                                var id = modal.dataset.productId;
                                var name = document.getElementById('editName').value.trim();
                                var retail = parseFloat(document.getElementById('editRetail').value);
                                var wholesale = parseFloat(document.getElementById('editWholesale').value);
                                var image = document.getElementById('editImage').value.trim();
                                var category = document.getElementById('editCategory').value;
                                if (!name || !retail || !image) {
                                    ui.notify('Ошибка', 'Заполните все поля', 'error');
                                    return;
                                }
                                apiRequest('PUT', '/api/products/' + id, { name, retailPrice: retail, wholesalePrice: wholesale || retail * 0.85, image, category }, true)
                                    .then(data => {
                                        if (data && data._id) {
                                            ui.notify('Успех', ui.t('productUpdated'), 'success');
                                            modal.style.display = 'none';
                                            ui.renderAdmin();
                                        } else {
                                            ui.notify('Ошибка', 'Не удалось обновить товар', 'error');
                                        }
                                    });
                            };
                        }
                        document.getElementById('editName').value = product.name;
                        document.getElementById('editRetail').value = product.retailPrice;
                        document.getElementById('editWholesale').value = product.wholesalePrice;
                        document.getElementById('editImage').value = product.image;
                        document.getElementById('editCategory').value = product.category;
                        modal.dataset.productId = productId;
                        modal.style.display = 'flex';
                    });
            };

            // Удаление
            window.ui.deleteProduct = function(productId) {
                if (!confirm('Удалить товар?')) return;
                apiRequest('DELETE', '/api/products/' + productId, null, true)
                    .then(data => {
                        if (data && data.message) {
                            ui.notify('Успех', 'Товар удалён', 'success');
                            ui.renderAdmin();
                        } else {
                            ui.notify('Ошибка', 'Не удалось удалить товар', 'error');
                        }
                    });
            };
        }
    };

    // ---------- ГЛАВНЫЙ МОДУЛЬ ----------
    var app = {
        init: function() {
            console.log('Зайди удивишься v5.0 загружен (интеграция с бэкендом)');
            var user = JSON.parse(localStorage.getItem('tm_user') || 'null');
            if (user) {
                apiRequest('GET', '/api/auth/me', null, true)
                    .then(data => {
                        if (data && data._id) {
                            ui.renderMain();
                        } else {
                            localStorage.removeItem('tm_token');
                            localStorage.removeItem('tm_user');
                            ui.renderPublic();
                        }
                    });
            } else {
                ui.renderPublic();
            }
        },
        navigateTo: function(view) {
            window._currentView = view;
            switch (view) {
                case 'trade': ui.renderTrade(); break;
                case 'chat': ui.renderChat(); break;
                case 'mail': ui.renderMail(); break;
                case 'pay': ui.renderPay(); break;
                case 'coin': ui.renderCoin(); break;
                case 'bank': ui.renderBank(); break;
                case 'admin': ui.renderAdmin(); break;
                default: ui.renderMain();
            }
        },
        logout: function() {
            localStorage.removeItem('tm_token');
            localStorage.removeItem('tm_user');
            ui.renderPublic();
        }
    };

    window.app = app;
    window.ui = ui;

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() { app.init(); });
    } else {
        app.init();
    }

})();
</script>
</body>
</html>
